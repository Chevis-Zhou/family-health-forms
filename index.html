<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>爸爸的健康采集与档案</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'WenQuanYi Micro Hei', sans-serif;
    background: #F0F4F8; /* Light blue-gray background */
    color: #1E293B; /* Slate 800 */
    line-height: 1.75;
    font-size: 17px;
    -webkit-font-smoothing: antialiased;
  }

  :root {
    --blue:         #2563EB;
    --blue-light:   #EFF6FF;
    --blue-mid:     #BFDBFE;
    --card:         #FFFFFF;
    --text:         #1E293B;
    --muted:        #64748B;
    --border:       #E2E8F0;
    --shadow:       rgba(15, 23, 42, 0.07);
  }

  .page {
    max-width: 480px;
    margin: 0 auto;
    padding-bottom: 56px;
  }

  .header {
    background: linear-gradient(160deg, #1E3A8A 0%, #3B82F6 100%);
    color: #fff;
    padding: 52px 28px 40px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 140px; height: 140px;
    border-radius: 50%;
    background: rgba(255,255,255,0.07);
  }
  .header::after {
    content: '';
    position: absolute;
    bottom: -24px; left: -24px;
    width: 90px; height: 90px;
    border-radius: 50%;
    background: rgba(255,255,255,0.05);
  }
  .header-eyebrow {
    font-size: 12px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    opacity: 0.65;
    margin-bottom: 10px;
  }
  .header-title {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 2px;
    margin-bottom: 6px;
  }
  .header-sub {
    font-size: 14px;
    opacity: 0.7;
    line-height: 1.6;
  }

  .body {
    padding: 0 14px;
    margin-top: -18px;
    position: relative;
  }

  .intro-card {
    background: var(--card);
    border-radius: 18px;
    padding: 28px 22px;
    box-shadow: 0 4px 22px var(--shadow);
    border: 1px solid var(--border);
    margin-bottom: 28px;
    text-align: center;
  }
  .intro-icon {
    width: 52px; height: 52px;
    background: var(--blue-light);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
  }
  .intro-text {
    font-size: 15.5px;
    color: var(--text);
    line-height: 1.9;
  }

  .section-label {
    font-size: 11.5px;
    font-weight: 700;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
    padding-left: 2px;
  }
  .section-wrap { margin-bottom: 26px; }

  /* ─── Report link cards ─── */
  .report-link {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 18px 16px;
    background: var(--card);
    border-radius: 14px;
    border: 1.5px solid var(--border);
    margin-bottom: 10px;
    text-decoration: none;
    color: inherit;
    transition: border-color 0.18s, box-shadow 0.18s;
    -webkit-tap-highlight-color: transparent;
  }
  .report-link:active { opacity: 0.75; }
  .report-link:hover {
    border-color: var(--blue-mid);
    box-shadow: 0 2px 12px var(--shadow);
  }

  .rl-icon {
    width: 44px; height: 44px; min-width: 44px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
  }
  .rl-icon-form   { background: linear-gradient(135deg, #DBEAFE, #BFDBFE); }
  .rl-icon-meta   { background: linear-gradient(135deg, #E8E4F8, #DDD6F5); }
  .rl-icon-digest { background: linear-gradient(135deg, #FEF4DA, #FCEAB8); }

  .rl-content { flex: 1; min-width: 0; }
  .rl-title {
    font-size: 15.5px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.3;
    margin-bottom: 3px;
  }
  .rl-meta {
    font-size: 12.5px;
    color: var(--muted);
    line-height: 1.5;
  }
  .rl-version {
    display: inline-block;
    padding: 1px 7px;
    border-radius: 100px;
    font-size: 10.5px;
    font-weight: 700;
    background: var(--blue-light);
    color: var(--blue);
    margin-left: 6px;
    vertical-align: 1px;
  }
  .rl-arrow {
    flex-shrink: 0;
    color: var(--muted);
    opacity: 0.5;
  }

  /* ─── Empty state ─── */
  .empty-card {
    padding: 20px 18px;
    background: var(--card);
    border-radius: 14px;
    border: 1.5px dashed var(--border);
    text-align: center;
    color: var(--muted);
    font-size: 14px;
  }

  .footer {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    padding: 28px 16px 0;
  }
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <div class="header-eyebrow">健康评估报告中心</div>
    <div class="header-title">爸爸的健康报告</div>
    <div class="header-sub">宸宸帮你整理的所有健康评估</div>
  </div>

  <div class="body">

    <div class="intro-card">
      <div class="intro-icon">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#2563EB" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      </div>
      <p class="intro-text">
        这里是宸宸帮你整理的所有健康评估报告。<br>
        每次采集完信息，我会把结果整理成一份新的报告放在这里。<br><br>
        点进去就能看，做完的事情可以打钩。
      </p>
    </div>

    <!-- ═══ 综合基线采集 ═══ -->
    <div class="section-wrap">
      <div class="section-label">最新采集任务</div>

      <a class="report-link" href="health-intake-form-04-dad-comprehensive.html">
        <div class="rl-icon rl-icon-form">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#2563EB" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </div>
        <div class="rl-content">
          <div class="rl-title">爸爸综合健康基线采集表<span class="rl-version">新</span></div>
          <div class="rl-meta">2026年6月 · 体检指标、三高用药与日常症状</div>
        </div>
        <div class="rl-arrow">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
      </a>
    </div>

    <!-- ═══ 代谢与血脂 ═══ -->
    <div class="section-wrap">
      <div class="section-label">代谢与血脂</div>
      <div class="empty-card">还没有生成报告，采集完信息后会出现在这里</div>
    </div>

    <!-- ═══ 视力与眼科 ═══ -->
    <div class="section-wrap">
      <div class="section-label">视力与眼科</div>
      <div class="empty-card">还没有生成报告，采集完信息后会出现在这里</div>
    </div>

  </div>

  <div class="footer">
    <div style="display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin-bottom:12px;">
      <a href="https://chevis-zhou.github.io/mom-health/index.html" style="display:inline-block; padding:8px 14px; background:var(--blue-light); color:var(--blue); border-radius:20px; text-decoration:none; font-weight:600; font-size:13px; border:1px solid var(--blue-mid);">
        👈 妈妈的健康报告
      </a>
      <a href="https://chevis-zhou.github.io/family-health-forms/chevis.html" style="display:inline-block; padding:8px 14px; background:var(--blue-light); color:var(--blue); border-radius:20px; text-decoration:none; font-weight:600; font-size:13px; border:1px solid var(--blue-mid);">
        宸宸的健康快照 👉
      </a>
    </div>
    健康评估报告中心 · 由宸宸整理维护
  </div>
</div>
</body>
</html>
